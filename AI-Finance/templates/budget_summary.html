<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Summary</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:#f8fafc; }
h2 { text-align:center; margin-bottom:30px; }
.list-group-item { background: rgba(255,255,255,0.1); color:#f8fafc; margin-bottom:5px; border:none; border-radius:10px; }
.container { max-width:600px; margin:auto; }
canvas { background: rgba(255,255,255,0.1); border-radius:15px; padding:15px; }
a.btn { display:block; text-align:center; margin-top:15px; }
</style>
</head>
<body>
<div class="container mt-5">
  <h2>Budget Summary</h2>
  <ul class="list-group mt-3">
    <li class="list-group-item">Salary: ₹{{ budget.salary }}</li>
    <li class="list-group-item">Total Expenses: ₹{{ total_expenses }}</li>
    <li class="list-group-item">Savings ({{ budget.savings_percent }}%): ₹{{ savings_amount }}</li>
    <li class="list-group-item">Remaining Balance: ₹{{ remaining }}</li>
  </ul>

  <canvas id="budgetChart" height="200"></canvas>
  <a href="/budget/" class="btn btn-secondary mt-3">Edit Budget</a>
</div>

<script>
const ctx = document.getElementById('budgetChart').getContext('2d');
const data = {
    labels: ['Expenses', 'Savings', 'Remaining'],
    datasets: [{
        label: 'Budget Breakdown',
        data: [{{ total_expenses }}, {{ savings_amount }}, {{ remaining }}],
        backgroundColor: ['#f87171','#60a5fa','#34d399'],
        borderColor: ['#f87171','#60a5fa','#34d399'],
        borderWidth: 1
    }]
};
new Chart(ctx, { type: 'pie', data: data });
</script>
</body>
</html>
