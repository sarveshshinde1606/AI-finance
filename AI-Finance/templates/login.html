<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Finance Planner</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(180deg, #0a0f1c 0%, #111827 100%);
  color: #f1f5f9;
}

.login-section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 50px 15px;
}

.project-title {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(90deg, #0ea5e9, #6366f1, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 40px;
  text-align: center;
}

.login-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 50px 35px;
  max-width: 450px;
  width: 100%;
  box-shadow: 0 0 40px rgba(14, 165, 233, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.1);
  text-align: center;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(-20px); }
  100% { opacity: 1; transform: translateY(0); }
}

.login-card input {
  background: rgba(255, 255, 255, 0.1);
  border: none;
  color: #e2e8f0;
  margin-bottom: 20px;
  padding: 12px 15px;
  border-radius: 10px;
  width: 100%;
  font-size: 1rem;
  transition: 0.3s;
}
.login-card input::placeholder {
  color: #94a3b8;
}
.login-card input:focus {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
  outline: none;
}

.btn-login {
  background: linear-gradient(90deg, #0ea5e9, #6366f1);
  color: white;
  border: none;
  border-radius: 30px;
  padding: 12px 0;
  width: 100%;
  font-weight: 600;
  font-size: 1rem;
  transition: 0.3s;
}
.btn-login:hover {
  background: linear-gradient(90deg, #6366f1, #a855f7);
  transform: scale(1.05);
}

.login-card p {
  margin-top: 20px;
  color: #94a3b8;
}
.login-card p a {
  color: #38bdf8;
  text-decoration: none;
  font-weight: 500;
}
.login-card p a:hover {
  color: #a855f7;
  text-decoration: underline;
}
</style>
</head>
<body>

<section class="login-section">
  <div class="project-title">AI-Based Personalized Financial Learning & Planning System</div>

  <div class="login-card">
    <form method="POST">
       {% csrf_token %}
       {% if messages %}
         {% for message in messages %}
           <div class="alert alert-{{ message.tags }} mb-3">{{ message }}</div>
         {% endfor %}
       {% endif %}

       <input type="text" name="username" placeholder="Username" required>
       <input type="password" name="password" placeholder="Password" required>
       <button type="submit" class="btn btn-login mt-3">Login</button>
    </form>
    <p>Don't have an account? <a href="/register">Create an account</a></p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
