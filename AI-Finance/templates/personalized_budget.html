<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Budget Planner</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
            min-height:100vh;
            color:white;
        }

        /* ================= NAVBAR ================= */

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
            background:rgba(17,24,39,0.85);
            backdrop-filter:blur(15px);
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }

        .navbar h1{
            font-size:18px;
            letter-spacing:1px;
        }

        .nav-links a{
            text-decoration:none;
            margin-left:20px;
            color:#cbd5e1;
            font-size:14px;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#22d3ee;
        }

        .logout-btn{
            padding:6px 14px;
            background:linear-gradient(90deg,#ef4444,#dc2626);
            border-radius:6px;
            color:white !important;
        }

        /* ================= MAIN CONTENT ================= */

        .container{
            max-width:1000px;
            margin:50px auto;
            padding:20px;
        }

        .card{
            background:rgba(30,41,59,0.9);
            backdrop-filter:blur(15px);
            padding:30px;
            border-radius:18px;
            box-shadow:0 20px 50px rgba(0,0,0,0.6);
            margin-bottom:30px;
            animation:fadeIn 0.8s ease-in-out;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input, button{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border-radius:10px;
            border:none;
            font-size:14px;
        }

        input{
            background:#334155;
            color:white;
        }

        input:focus{
            outline:none;
            box-shadow:0 0 8px #22d3ee;
        }

        button{
            background:linear-gradient(90deg,#22c55e,#16a34a);
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 8px 20px rgba(34,197,94,0.4);
        }

        /* ================= RISK BADGE ================= */

        .risk-badge{
            text-align:center;
            font-size:20px;
            font-weight:bold;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            animation:pop 0.5s ease;
        }

        .low{ background:#16a34a; }
        .moderate{ background:#facc15; color:black; }
        .high{ background:#ef4444; }

        /* ================= RESULT ================= */

        .result-section{
            background:#0f172a;
            padding:20px;
            border-radius:12px;
            line-height:1.7;
            white-space:pre-line;
            animation:slideUp 0.8s ease;
        }

        /* ================= ANIMATIONS ================= */

        @keyframes fadeIn{
            from{opacity:0;}
            to{opacity:1;}
        }

        @keyframes slideUp{
            from{transform:translateY(30px); opacity:0;}
            to{transform:translateY(0); opacity:1;}
        }

        @keyframes pop{
            from{transform:scale(0.5);}
            to{transform:scale(1);}
        }

        @media(max-width:768px){
            .navbar{
                flex-direction:column;
                gap:10px;
            }
        }

    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">
    <h1>💰 Smart Finance Portal</h1>

    <div class="nav-links">
        <a href="/budget_dashboard/">Dashboard</a>
        <a href="/personalized_budgeting/">Budgeting</a>
        <a href="/investment_recommendation/">Investment</a>
        <a href="/ai_assistant/">AI Assistant</a>
        <a href="/human_assistant/">Advisor</a>
          <!--<a href="/proxy_scanner/">Security</a>-->
        <a href="/logout/" class="logout-btn">Logout</a>
    </div>
</div>

<!-- ================= MAIN CONTENT ================= -->

<div class="container">

    <!-- Input Form -->
    <div class="card">
        <h2>💰 AI Smart Budget & Investment Planner</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="number" name="income" placeholder="Monthly Income (₹)" required>
            <input type="number" name="expenses" placeholder="Monthly Expenses (₹)" required>
            <input type="number" name="savings" placeholder="Current Savings (₹)" required>
            <input type="text" name="goal" placeholder="Financial Goal (House, Retirement, Car, etc.)" required>

            <button type="submit">Generate Smart AI Plan</button>
        </form>
    </div>

    {% if result %}
    <div class="card">

        {% if detected_risk %}
            <div class="risk-badge 
                {% if detected_risk == 'Low' %}low{% endif %}
                {% if detected_risk == 'Moderate' %}moderate{% endif %}
                {% if detected_risk == 'High' %}high{% endif %}
            ">
                🔎 Detected Risk Profile: {{ detected_risk }}
            </div>
        {% endif %}

        <div class="result-section">
            {{ result }}
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
