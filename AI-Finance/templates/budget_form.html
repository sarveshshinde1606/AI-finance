<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Planner</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:#f8fafc; }
h2 { text-align:center; margin-bottom:30px; }
form { max-width:600px; margin:auto; background: rgba(255,255,255,0.1); padding:30px; border-radius:20px; }
input { background: rgba(255,255,255,0.05); border:none; color:#f8fafc; padding:10px; margin-bottom:15px; width:100%; border-radius:8px; }
input::placeholder { color:#cbd5e1; }
button { width:100%; padding:10px; font-weight:bold; }
</style>
</head>
<body>
<div class="container mt-5">
  <h2>Personalized Budget Planner</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form.salary }}
    {{ form.rent }}
    {{ form.food }}
    {{ form.transport }}
    {{ form.savings_percent }}
    <button type="submit" class="btn btn-primary mt-2">Generate Budget Plan</button>
  </form>
</div>
</body>
</html>
