<!DOCTYPE html>
<html>
<head>
    <title>Proxy Scanner</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg,#fef9c3,#fde68a);
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        .status {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>🔍 Proxy & Security Scanner</h2>

        <p><strong>Your IP Address:</strong> {{ ip_address }}</p>

        <div class="status">
            {{ proxy_status }}
        </div>

    </div>

</div>

</body>
</html>
