<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { background:#111827; color:white; font-family:Segoe UI; }
        .box { max-width:400px; margin:120px auto; background:#1f2937; padding:30px; border-radius:12px; }
        input,button { width:100%; padding:12px; margin-top:10px; border-radius:6px; border:none; }
        button { background:#2563eb; color:white; cursor:pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>Admin Login</h2>
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
